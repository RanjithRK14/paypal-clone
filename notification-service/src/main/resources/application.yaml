server:
  port: 8084

spring:
  datasource:
    url: jdbc:h2:mem:notificationdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: notification-group
      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # ✅ IMPORTANT FIX
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:

        # ✅ delegate actual deserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        # ✅ use YOUR local Transaction class
        spring.json.value.default.type: com.paypal.notification_service.model.Transaction

        # ✅ trust packages
        spring.json.trusted.packages: "*"

        # ✅ CRITICAL FIX — ignore sender package
        spring.json.use.type.headers: false