services:
  # ── API Gateway ──────────────────────────────────────────────────────────
  # ONLY the gateway is kept awake 24/7 (720 hours/month = within free 750h limit)
  # healthCheckPath: /health → answered by gateway itself (HealthController.java)
  # This does NOT forward to any backend service → health check always passes
  - type: web
    name: novapay-api-gateway
    runtime: docker
    repo: https://github.com/RanjithRK14/paypal-clone
    rootDir: api-gateway
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: USER_SERVICE_URL
        value: https://novapay-user-service.onrender.com
      - key: WALLET_SERVICE_URL
        value: https://novapay-wallet-service.onrender.com
      - key: TRANSACTION_SERVICE_URL
        value: https://novapay-transaction-service.onrender.com
      - key: REWARD_SERVICE_URL
        value: https://novapay-reward-service.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        value: https://novapay-notification-service.onrender.com
      - key: FRONTEND_URL
        value: https://novapay-app.netlify.app

  # ── Backend Services (sleep when idle to save Render free hours) ──────────
  # These DO NOT have healthCheckPath — Render lets them sleep.
  # They wake up on first request (gateway has 200s timeout to handle cold start).
  # App.jsx shows "Server is waking up..." UI during the 2-minute cold start.

  - type: web
    name: novapay-user-service
    runtime: docker
    repo: https://github.com/RanjithRK14/paypal-clone
    rootDir: user-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-solitary-paper-a1tufzb5-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        value: npg_gVO2FRGBYQ1h
      - key: JWT_SECRET
        value: secret123secret123secret123secret123secret123secret123
      - key: WALLET_SERVICE_URL
        value: https://novapay-wallet-service.onrender.com

  - type: web
