server:
  port: 8080

spring:
  application:
    name: api-gateway-service

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      timeout: 1s

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        - id: user-service-auth
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: user-service-api
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: wallet-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/wallets/**

        - id: transaction-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/transactions/**

        - id: reward-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/rewards/**

        # NOTE: controller is @RequestMapping("/api/notify") — NOT /api/notifications
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notify/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG